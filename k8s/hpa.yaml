apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spot-render-web
  namespace: spot-render
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: spot-render-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
